name: Create GAR Regcred in Kubernetes

on:
  push:
    branches:
      - deployment



jobs:
  create-regcred:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      WILDTAG_CLUSTER: ${{ vars.WILDTAG_CLUSTER }}
      WILDTAG_CLUSTER_ZONE: ${{ vars.WILDTAG_CLUSTER_ZONE }}
      WILDTAG_NAMESPACE: ${{ vars.WILDTAG_NAMESPACE }}

    steps:
      - name: print environment
        run: |
          echo "GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}"
          echo "WILDTAG_CLUSTER: ${{ env.WILDTAG_CLUSTER }}"
          echo "WILDTAG_CLUSTER_ZONE: ${{ env.WILDTAG_CLUSTER_ZONE }}"
          echo "WILDTAG_NAMESPACE: ${{ env.WILDTAG_NAMESPACE }}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Google Cloud SDK
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Get Cluster Creds
        id: 'get-creds'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: ${{ env.WILDTAG_CLUSTER }}
          location: ${{ env.WILDTAG_CLUSTER_ZONE }}

      - name: Create Docker registry secret
        run: |
          if kubectl get secret regcred --namespace=${{ env.WILDTAG_NAMESPACE }} >/dev/null 2>&1; then 
            kubectl delete secret regcred --namespace=${{ env.WILDTAG_NAMESPACE }}
          else
            echo "secret doesn't exists - creating it"
          fi
          kubectl create secret docker-registry regcred \
          --docker-server='me-west1-docker.pkg.dev' \
          --docker-username=_json_key \
          --docker-password='$(echo ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }} | base64 --decode)'  \
          --namespace=${{ env.WILDTAG_NAMESPACE }}

      - name: Upgrade Env
        run:
          ${GITHUB_WORKSPACE}/deployment/scripts/deploy_env.sh ${{ env.WILDTAG_NAMESPACE }}

